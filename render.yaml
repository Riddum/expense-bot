services:
  - type: web
    name: expense-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        scope: run
      - key: WEBAPP_URL
        scope: run
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        scope: run
      - key: LEDGER_DB_PATH
        value: /data/ledger.db
        scope: run
    disk:
      name: ledger-data
      mountPath: /data
      sizeGB: 1
